<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XBWorld — AI Game Observer</title>
<style>
  :root {
    --bg-primary: #0b0f19;
    --bg-secondary: #111827;
    --bg-card: #1a2235;
    --bg-card-hover: #1f2a40;
    --border: #2a3550;
    --text-primary: #e8eaf0;
    --text-secondary: #8892a8;
    --text-muted: #5a6478;
    --accent-blue: #60a5fa;
    --accent-green: #34d399;
    --accent-amber: #fbbf24;
    --accent-red: #f87171;
    --accent-purple: #a78bfa;
    --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: var(--bg-primary); color: var(--text-primary);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }

  header {
    background: var(--bg-secondary);
    padding: 0 20px; height: 48px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; z-index: 100;
  }
  header .left { display: flex; align-items: center; gap: 12px; }
  header .logo { font-size: 15px; font-weight: 700; color: var(--accent-blue); letter-spacing: -0.3px; }
  header .divider { width: 1px; height: 20px; background: var(--border); }
  header .game-info { font-size: 12px; color: var(--text-secondary); }
  header .right { display: flex; align-items: center; gap: 16px; }
  .conn-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 500; padding: 4px 10px;
    border-radius: 20px; background: rgba(52,211,153,0.1); color: var(--accent-green);
  }
  .conn-badge.off { background: rgba(248,113,113,0.1); color: var(--accent-red); }
  .conn-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .btn-sm {
    padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg-card); color: var(--text-primary); font-size: 12px;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-sm:hover { background: var(--bg-card-hover); border-color: var(--accent-blue); }

  .layout { display: flex; flex: 1; overflow: hidden; }
  .panel-left { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
  .panel-center { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .panel-right { width: 360px; flex-shrink: 0; display: flex; flex-direction: column; border-left: 1px solid var(--border); }

  .agent-list { flex: 1; overflow-y: auto; padding: 8px; }
  .agent-list::-webkit-scrollbar { width: 4px; }
  .agent-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .agent-card {
    background: var(--bg-card); border-radius: var(--radius);
    padding: 12px; margin-bottom: 6px;
    border: 1px solid transparent; transition: all 0.15s;
  }
  .agent-card:hover { border-color: var(--border); background: var(--bg-card-hover); }
  .agent-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .agent-name { font-size: 13px; font-weight: 600; color: var(--accent-blue); }
  .agent-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .agent-status.online { background: rgba(52,211,153,0.15); color: var(--accent-green); }
  .agent-status.offline { background: rgba(248,113,113,0.15); color: var(--accent-red); }
  .agent-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .stat-item { font-size: 11px; color: var(--text-secondary); }
  .stat-item .val { color: var(--text-primary); font-weight: 600; }
  .stat-item .label { color: var(--text-muted); }
  .agent-research {
    margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-secondary);
  }
  .research-bar {
    height: 3px; background: var(--bg-primary); border-radius: 2px; margin-top: 4px; overflow: hidden;
  }
  .research-bar .fill { height: 100%; background: var(--accent-blue); border-radius: 2px; transition: width 0.3s; }
  .agent-report {
    margin-top: 6px; font-size: 10px; color: var(--text-muted);
    font-style: italic; line-height: 1.4;
    max-height: 40px; overflow: hidden;
  }

  .map-container { flex: 1; position: relative; background: #000; }
  .map-container iframe { width: 100%; height: 100%; border: none; }
  .map-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-primary); z-index: 10;
  }
  .map-overlay.hidden { display: none; }
  .map-placeholder { text-align: center; color: var(--text-secondary); }
  .map-placeholder .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
  .map-placeholder h3 { font-size: 14px; margin-bottom: 6px; color: var(--text-primary); }
  .map-placeholder p { font-size: 12px; max-width: 280px; }
  .btn-primary {
    margin-top: 12px; padding: 8px 20px; border-radius: 6px; border: none;
    background: var(--accent-blue); color: #fff; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.85; }

  .events-panel { display: flex; flex-direction: column; height: 100%; }
  .events-header {
    padding: 10px 14px; font-size: 12px; font-weight: 600;
    color: var(--text-secondary); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .events-header .count { color: var(--text-muted); font-weight: 400; }
  .events-log {
    flex: 1; overflow-y: auto; padding: 6px 10px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px; line-height: 1.6;
  }
  .events-log::-webkit-scrollbar { width: 4px; }
  .events-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .evt {
    padding: 3px 8px; margin: 1px 0; border-radius: 4px;
    border-left: 2px solid var(--border); background: transparent;
    transition: background 0.15s;
  }
  .evt:hover { background: rgba(255,255,255,0.02); }
  .evt.turn_start { border-left-color: var(--accent-blue); }
  .evt.agent_action { border-left-color: var(--accent-green); }
  .evt.error { border-left-color: var(--accent-red); }
  .evt.command_sent { border-left-color: var(--accent-purple); }
  .evt .time { color: var(--text-muted); }
  .evt .agent-tag { color: var(--accent-blue); font-weight: 600; }
  .evt .tool-tag { color: var(--accent-green); }
  .evt .result-text { color: var(--text-secondary); }

  .cmd-bar {
    padding: 8px 10px; border-top: 1px solid var(--border);
    background: var(--bg-secondary); flex-shrink: 0;
  }
  .cmd-bar input {
    width: 100%; padding: 8px 12px; background: var(--bg-primary);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-primary); font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace; outline: none;
  }
  .cmd-bar input:focus { border-color: var(--accent-blue); }
  .cmd-bar input::placeholder { color: var(--text-muted); }

  @media (max-width: 1200px) {
    .panel-left { width: 240px; }
    .panel-right { width: 300px; }
  }
  @media (max-width: 900px) {
    .layout { flex-direction: column; }
    .panel-left, .panel-right { width: 100%; border: none; }
    .panel-left { max-height: 200px; flex-direction: row; overflow-x: auto; }
    .agent-list { display: flex; gap: 8px; flex-wrap: nowrap; }
    .agent-card { min-width: 220px; }
    .map-container { min-height: 300px; }
  }
</style>
</head>
<body>

<header>
  <div class="left">
    <span class="logo">XBWorld</span>
    <span class="divider"></span>
    <span class="game-info" id="game-info">AI Game Observer</span>
  </div>
  <div class="right">
    <div class="conn-badge off" id="conn-badge">
      <span class="dot"></span>
      <span id="conn-text">Connecting</span>
    </div>
    <button class="btn-sm" onclick="refreshAll()">Refresh</button>
  </div>
</header>

<div class="layout">
  <div class="panel-left">
    <div class="agent-list" id="agents-panel"></div>
  </div>
  <div class="panel-center">
    <div class="map-container" id="map-container">
      <div class="map-overlay" id="map-overlay">
        <div class="map-placeholder">
          <div class="icon">&#x1F5FA;</div>
          <h3>Game Map</h3>
          <p id="map-status-text">Checking game status...</p>
          <button class="btn-primary" id="btn-load-map" onclick="loadMap()" style="display:none">Load Map</button>
        </div>
      </div>
    </div>
  </div>
  <div class="panel-right">
    <div class="events-panel">
      <div class="events-header">
        <span>Event Log</span>
        <span class="count" id="event-count">0 events</span>
      </div>
      <div class="events-log" id="events-log"></div>
      <div class="cmd-bar">
        <input id="cmd-input" placeholder="agent_name command  (e.g. alpha research Alphabet)" />
      </div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let sse = null;
let gamePort = null;
let eventCount = 0;
let mapLoaded = false;

function connectSSE() {
  if (sse) sse.close();
  sse = new EventSource(API + '/game/events');
  const badge = document.getElementById('conn-badge');
  const text = document.getElementById('conn-text');

  sse.onopen = () => { badge.classList.remove('off'); text.textContent = 'Live'; };
  sse.onerror = () => { badge.classList.add('off'); text.textContent = 'Reconnecting'; };
  sse.onmessage = (e) => {
    try { appendEvent(JSON.parse(e.data)); } catch {}
  };
}

function appendEvent(evt) {
  const log = document.getElementById('events-log');
  const div = document.createElement('div');
  div.className = 'evt ' + (evt.type || '');
  const ts = new Date().toLocaleTimeString('en', {hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
  let html = '<span class="time">' + ts + '</span> ';
  if (evt.agent) html += '<span class="agent-tag">' + evt.agent + '</span> ';

  if (evt.type === 'turn_start') {
    html += 'Turn <b>' + evt.turn + '</b> started';
  } else if (evt.type === 'agent_action') {
    html += '<span class="tool-tag">' + evt.tool + '</span>(' + trunc(JSON.stringify(evt.args||{}), 60) + ')';
    if (evt.result) html += ' &rarr; <span class="result-text">' + trunc(evt.result, 80) + '</span>';
  } else if (evt.type === 'command_sent') {
    html += '&rarr; ' + evt.result;
  } else {
    html += '<span class="result-text">' + trunc(JSON.stringify(evt), 150) + '</span>';
  }
  div.innerHTML = html;
  log.appendChild(div);
  if (log.children.length > 600) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
  eventCount++;
  document.getElementById('event-count').textContent = eventCount + ' events';
}

function trunc(s, n) { return s && s.length > n ? s.substring(0, n) + '\u2026' : s; }

async function refreshAgents() {
  try {
    const r = await fetch(API + '/game/status');
    const d = await r.json();
    const panel = document.getElementById('agents-panel');
    const info = document.getElementById('game-info');

    if (d.status === 'no_game') {
      panel.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">No game running.<br>Use the API to create one.</div>';
      info.textContent = 'No active game';
      document.getElementById('map-status-text').textContent = 'No game is running. Create a game first.';
      return;
    }

    gamePort = d.server_port;
    var agents = d.agents || [];
    info.textContent = 'Port ' + gamePort + ' \u00b7 ' + agents.length + ' agents';

    if (!mapLoaded) {
      document.getElementById('map-status-text').textContent = 'Game running on port ' + gamePort;
      document.getElementById('btn-load-map').style.display = '';
    }

    panel.innerHTML = agents.map(function(a) {
      var pct = a.tech_cost > 0 ? Math.round((a.bulbs / a.tech_cost) * 100) : 0;
      return '<div class="agent-card">' +
        '<div class="agent-header">' +
          '<span class="agent-name">' + a.name + '</span>' +
          '<span class="agent-status ' + (a.connected ? 'online' : 'offline') + '">' + (a.connected ? 'Online' : 'Offline') + '</span>' +
        '</div>' +
        '<div class="agent-stats">' +
          '<div class="stat-item"><span class="label">Turn</span> <span class="val">' + a.turn + '</span></div>' +
          '<div class="stat-item"><span class="label">Gold</span> <span class="val">' + (a.gold != null ? a.gold : '\u2014') + '</span></div>' +
          '<div class="stat-item"><span class="label">Cities</span> <span class="val">' + a.cities + '</span></div>' +
          '<div class="stat-item"><span class="label">Units</span> <span class="val">' + a.units + '</span></div>' +
        '</div>' +
        '<div class="agent-research">' +
          '<span>Research: <b>' + (a.researching || 'None') + '</b></span>' +
          (a.tech_cost > 0 ? '<span style="float:right">' + a.bulbs + '/' + a.tech_cost + ' (' + pct + '%)</span>' : '') +
          (a.tech_cost > 0 ? '<div class="research-bar"><div class="fill" style="width:' + pct + '%"></div></div>' : '') +
          '<div style="margin-top:3px">Known: ' + (a.known_techs != null ? a.known_techs : 0) + ' techs \u00b7 Tax ' + (a.tax != null ? a.tax : '?') + '% / Sci ' + (a.science != null ? a.science : '?') + '% / Lux ' + (a.luxury != null ? a.luxury : '?') + '%</div>' +
        '</div>' +
        (a.perf ? '<div style="margin-top:4px;font-size:10px;color:var(--text-muted)">Avg ' + a.perf.avg_turn_s + 's/turn \u00b7 LLM ' + a.perf.last_turn_llm_s + 's</div>' : '') +
        (a.last_report ? '<div class="agent-report">' + trunc(a.last_report, 120) + '</div>' : '') +
      '</div>';
    }).join('');
  } catch (e) {}
}

function loadMap() {
  if (!gamePort) return;
  var container = document.getElementById('map-container');
  var overlay = document.getElementById('map-overlay');
  var iframe = document.createElement('iframe');
  iframe.src = '/webclient/?action=observe&civserverport=' + gamePort;
  iframe.allow = 'autoplay';
  container.insertBefore(iframe, overlay);
  overlay.classList.add('hidden');
  mapLoaded = true;
}

document.getElementById('cmd-input').addEventListener('keydown', async function(e) {
  if (e.key !== 'Enter') return;
  var val = e.target.value.trim();
  if (!val) return;
  e.target.value = '';
  var sp = val.indexOf(' ');
  if (sp > 0) {
    var name = val.substring(0, sp);
    var cmd = val.substring(sp + 1);
    try {
      await fetch(API + '/agents/' + name + '/command', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({command: cmd}),
      });
      appendEvent({type: 'command_sent', agent: name, result: cmd});
    } catch (err) {
      appendEvent({type: 'error', result: 'Send failed: ' + err.message});
    }
  }
});

function refreshAll() { refreshAgents(); }

connectSSE();
refreshAgents();
setInterval(refreshAgents, 4000);
</script>
</body>
</html>
